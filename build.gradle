buildscript {
    repositories {
        maven {
            url "https://plugins.gradle.org/m2/"
        }
        maven {
            url "https://oss.sonatype.org/content/repositories/snapshots"
        }
        maven {
            url "https://jcenter.bintray.com/"
        }
        maven {
            url "https://jitpack.io/"
        }
    }
    dependencies {
        classpath "com.github.johnrengelman:shadow:8.1.0"
    }
}

plugins {
    id 'java'
    id 'application'
    id "com.github.johnrengelman.shadow" version "8.1.0"
}

application {
    mainClass = 'org.foxesworld.Launcher'
}


group 'org.foxesworld'
version '1.5.3-TwilightAdventure patch-x2'

repositories {
    mavenCentral()
}

dependencies {
    implementation files('lib/foxesworld/Engine-1.2.0-ALPHA-all.jar')
}
apply plugin: "com.github.johnrengelman.shadow"

test {
    useJUnitPlatform()
}

if (System.getProperty("java.home") == null) {
    System.out.println("No Java Home set, assuming that we are running from GraalVM. Fixing...")
    System.setProperty("java.home", new File(".").getAbsolutePath())
}

task nativeDist() {
    doLast {
        copy {
            mkdir 'build/dist'
            from 'build/native/nativeCompile'
            into 'build/dist'
            include '*.exe'
            include '*.dll'
        }
        println System.properties['java.home']
        copy {
            mkdir 'build/dist/lib'
            from System.properties['java.home'] + '/lib'
            into 'build/dist/lib'
            include 'fontconfig.bfc'
            include 'fontconfig.properties.src'
            include 'psfont.properties.ja'
            include 'psfontj2d.properties'
        }
    }
}