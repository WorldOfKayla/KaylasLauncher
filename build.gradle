buildscript {
    repositories {
        maven {
            url "https://plugins.gradle.org/m2/"
        }
        maven {
            url "https://oss.sonatype.org/content/repositories/snapshots"
        }
        maven {
            url "https://jcenter.bintray.com/"
        }
        maven {
            url "https://jitpack.io/"
        }
    }
    dependencies {
        classpath "com.github.johnrengelman:shadow:8.1.0"
    }
}

plugins {
    id 'java'
    id 'application'
    id "com.github.johnrengelman.shadow" version "8.1.0"
}

application {
    mainClass = 'org.foxesworld.APP'
}


group 'org.foxesworld'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation files('lib/foxesworld/cfgProvider-1.5.0-Release.jar')
    implementation files('lib/java-discord-rpc-2.0.1-all.jar')
    implementation 'com.github.stephengold:j-ogg-all:1.0.4'

    implementation group: 'me.tongfei', name: 'progressbar', version: '0.10.0'
    implementation group: 'org.fusesource.jansi', name: 'jansi', version: '2.3.1'

    implementation group: 'com.google.code.gson', name: 'gson', version: '2.7'

    implementation group: 'org.apache.logging.log4j', name: 'log4j-api', version: '2.14.1'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-core', version: '2.14.1'
    implementation 'org.jetbrains:annotations:20.1.0'
}

apply plugin: "com.github.johnrengelman.shadow"

test {
    useJUnitPlatform()
}